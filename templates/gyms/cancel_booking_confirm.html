{% extends "base.html" %}

{% block content %}
<div class="container py-4 d-flex justify-content-center">
  <div class="card shadow-sm rounded p-4" style="max-width: 500px; width: 100%;">
    <h4 class="card-title mb-3 text-center">Cancellation of your booking</h4>

    {% if full_refund %}
      <div class="alert alert-success text-center">
        ⚠️ You will cancel your booking with full refund.
      </div>
    {% else %}
      <div class="alert alert-warning text-center">
        ⚠️ You will cancel your booking without refund.
      </div>
    {% endif %}

    <form method="post" class="text-center mt-3">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Confirm</button>
      <a href="{% url 'users:user-detail' request.user.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
