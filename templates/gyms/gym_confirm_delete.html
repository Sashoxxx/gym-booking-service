{% extends "base.html" %}
{% block content %}
<h2>Delete Gym</h2>
<p>Are you sure you want to delete "{{ object.name }}"?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, delete</button>
  <a href="{% url 'gyms:gym-list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
