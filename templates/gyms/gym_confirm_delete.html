{% extends "base.html" %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-danger">
        <div class="card-body text-center">
          <h2 class="card-title mb-3">⚠️ Delete Gym</h2>
          <p class="mb-4">Are you sure you want to delete <strong>"{{ object.name }}"</strong>?</p>

          <form method="post" class="d-flex justify-content-center gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger btn-lg">Yes, delete</button>
            <a href="{% url 'gyms:gym-list' %}" class="btn btn-secondary btn-lg">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
