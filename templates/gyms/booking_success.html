{% extends "base.html" %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm border-success">
        <div class="card-body text-center">
          <h2 class="card-title mb-3">🎉 Booking Successful!</h2>
          <p class="mb-3">Your booking for <strong>"{{ session.title }}"</strong> has been confirmed.</p>

          <ul class="list-group list-group-flush mb-3 text-left">
            <li class="list-group-item"><strong>Gym:</strong> {{ gym.name }}</li>
            <li class="list-group-item"><strong>Date & Time:</strong> {{ session.start_time|date:"d.m.Y H:i" }}</li>
            <li class="list-group-item"><strong>Amount Paid:</strong> {{ booking.session.price }} $</li>
          </ul>

          <a href="{% url 'users:user-detail' request.user.pk %}" class="btn btn-primary btn-lg mt-3">
            View My Bookings
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
