<div class="card mb-3 shadow-sm">
  {% if user.is_authenticated %}
    <div class="card-body text-center">
      <h6 class="card-subtitle mb-2 text-muted">Logged in as</h6>
      <a href="{% url 'users:user-detail' user.pk %}" class="fw-bold text-decoration-none">
        <span class="badge bg-primary text-light">{{ user.get_username }}</span>
      </a>
      <form action="{% url 'logout' %}" method="post" class="mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger w-100">Logout</button>
      </form>
    </div>
  {% else %}
    <div class="card-body">
      <a href="{% url 'login'%}?next={{request.path}}" class="btn btn-primary w-100">Login</a>
    </div>
  {% endif %}
</div>

  <!-- Main Links -->
  <li class="list-group-item p-2 mt-2">
    <a href="/" class="btn btn-success w-100 text-left">Home</a>
  </li>
  <li class="list-group-item p-2 mt-2">
    <a href="{% url 'gyms:gym-list' %}" class="btn btn-success w-100 text-left">Gyms</a>
  </li>

  <!-- Admin Links -->
  {% if user.is_authenticated %}
    {% if user.is_superuser or user.role == ADMIN %}
      <li class="list-group-item p-2 mt-2">
        <a href="{% url 'users:create-staff' %}" class="btn btn-outline-success w-100 text-left">
          ➕ Create Staff
        </a>
      </li>
      <li class="list-group-item p-2 mt-2">
        <a href="{% url 'users:user-list' %}" class="btn btn-outline-success w-100 text-left">
          Users list
        </a>
      </li>
    {% endif %}
  {% endif %}
</ul>
