{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
  <div class="card shadow-sm rounded p-4" style="max-width: 500px; width: 100%;">
    <h2 class="card-title mb-4 text-center">Edit Profile</h2>

    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}

      <div class="text-center mt-3 d-flex justify-content-center gap-2">
        <button type="submit" class="btn btn-primary btn-sm">Save Changes</button>
        <a href="{% url 'users:user-detail' form.instance.pk %}" class="btn btn-secondary btn-sm">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
