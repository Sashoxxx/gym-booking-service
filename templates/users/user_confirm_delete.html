{% extends "base.html" %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
  <div class="card shadow-sm rounded p-4" style="max-width: 450px; width: 100%;">
    <h2 class="card-title mb-3 text-center">Delete Account</h2>
    <p class="text-center mb-4">
      Are you sure you want to delete your account, <strong>{{ user.username }}</strong>? This action cannot be undone.
    </p>

    <div class="d-flex justify-content-center gap-2">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-sm">Yes, delete me</button>
      </form>
      <a href="{% url 'users:user-detail' pk=user.id %}" class="btn btn-secondary btn-sm">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
