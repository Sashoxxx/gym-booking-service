{% extends "base.html" %}

{% block content %}
  {% if not user.is_authenticated %}
  {% load crispy_forms_tags %}
  <h2>Sign Up</h2>
  <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-primary">Register</button>
  </form>
  {% endif %}
{% endblock %}
